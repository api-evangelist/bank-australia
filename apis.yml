  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-payees
    type: APIReference
  - url: openapi/bank-australia-cds-banking-openapi.json
    type: OpenAPI
  description: >-
    Consumer-authorized saved-payee endpoints under the Consumer Data Right,
    served from https://resource.cdr.bankaust.com.au/cds-au/v1. Covers GET
    /banking/payees (list of the customer's saved payees) and GET
    /banking/payees/{payeeId} (payee detail, including domestic, biller, and
    international payee unions). Access requires an ACCC-accredited data
    recipient, the customer's consent, and the CDR security profile (OIDC/FAPI,
    mTLS); the resource host rejects unauthenticated connections (probed
    2026-07-21). The contract is the shared DSB Consumer Data Standards Banking
    OpenAPI (v1.36.0), not a bank-proprietary specification.
