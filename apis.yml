apis:
- aid: bank-australia:bank-australia-cdr-product-reference-data-api
  name: Bank Australia CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking
  - Public
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bankaust.com.au/support/open-banking/developer/
  baseURL: https://public.cdr.bankaust.com.au/cds-au/v1
  properties:
  - url: https://www.bankaust.com.au/support/open-banking/developer/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-products
    type: APIReference
  - url: openapi/bank-australia-cds-banking-openapi.json
    type: OpenAPI
  description: >-
    Public, unauthenticated Product Reference Data (PRD) endpoints under the
    Consumer Data Right. Serves GET /banking/products and GET
    /banking/products/{productId} at the CDS public base
    https://public.cdr.bankaust.com.au/cds-au/v1, returning machine-readable
    product, fee, rate, and eligibility data for Bank Australia's deposit, credit
    card, and lending products. Requests require the mandatory CDS `x-v` version
    header. Probed 2026-07-21: GET /banking/products returned HTTP 200. The
    contract is the shared DSB Consumer Data Standards Banking OpenAPI (v1.36.0,
    OpenAPI 3.0.3) harvested verbatim from the Data Standards Body, not a
    bank-proprietary specification.
- aid: bank-australia:bank-australia-cdr-accounts-balances-api
  name: Bank Australia CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Accounts
  - Balances
  - Banking
  - Consumer Authorized
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bankaust.com.au/support/open-banking/developer/
  baseURL: https://resource.cdr.bankaust.com.au/cds-au/v1/banking/accounts
  properties:
  - url: https://www.bankaust.com.au/support/open-banking/developer/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-accounts
    type: APIReference
  - url: openapi/bank-australia-cds-banking-openapi.json
    type: OpenAPI
  description: >-
    Consumer-authorized account and balance endpoints under the Consumer Data
    Right, served from Bank Australia's resource host
    https://resource.cdr.bankaust.com.au/cds-au/v1. Covers GET /banking/accounts
    (list of authorized accounts), GET /banking/accounts/balances (bulk
    balances), GET /banking/accounts/{accountId}/balance (single balance) and GET
    /banking/accounts/{accountId} (account detail). Access requires an ACCC-
    accredited data recipient (ADR), an eligible customer's consent, and the CDR
    security profile (OIDC/FAPI, mTLS); the resource host rejects unauthenticated
    connections (probed 2026-07-21: connection blocked, no unauthenticated
    response). The contract is the shared DSB Consumer Data Standards Banking
    OpenAPI (v1.36.0), not a bank-proprietary specification.
- aid: bank-australia:bank-australia-cdr-transactions-api
  name: Bank Australia CDR Transactions API
  tags:
  - CDR
  - Open Banking
  - Transactions
  - Banking
  - Consumer Authorized
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bankaust.com.au/support/open-banking/developer/
  baseURL: https://resource.cdr.bankaust.com.au/cds-au/v1/banking/accounts
  properties:
  - url: https://www.bankaust.com.au/support/open-banking/developer/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-transactions
    type: APIReference
  - url: openapi/bank-australia-cds-banking-openapi.json
    type: OpenAPI
  description: >-
    Consumer-authorized transaction endpoints under the Consumer Data Right,
    served from https://resource.cdr.bankaust.com.au/cds-au/v1. Covers GET
    /banking/accounts/{accountId}/transactions (transactions for an account, with
    date and amount filters) and GET
    /banking/accounts/{accountId}/transactions/{transactionId} (transaction
    detail). Access requires an ACCC-accredited data recipient, the customer's
    consent, and the CDR security profile (OIDC/FAPI, mTLS); the resource host
    rejects unauthenticated connections (probed 2026-07-21). The contract is the
    shared DSB Consumer Data Standards Banking OpenAPI (v1.36.0), not a
    bank-proprietary specification.
