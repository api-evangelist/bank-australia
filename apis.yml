aid: bank-australia
url: https://raw.githubusercontent.com/api-evangelist/bank-australia/refs/heads/main/apis.yml
name: Bank Australia
kind: company
description: >-
  Bank Australia is a customer-owned (mutual) bank headquartered in Collingwood,
  Victoria, tracing its origins to the 1957 CSIRO Co-operative Credit Society and
  formed through the merger of more than 70 credit unions and co-operatives (via
  mecu and bankmecu) before adopting the Bank Australia name in 2015. As an
  APRA-regulated authorised deposit-taking institution (ADI) and a certified B
  Corporation, it is owned by its customers rather than shareholders and is known
  for responsible, fossil-fuel-free lending. Under Australia's Consumer Data Right
  (CDR / Open Banking), Bank Australia operates as a data holder: it exposes a
  public, unauthenticated Product Reference Data (PRD) API conforming to the Data
  Standards Body (DSB) Consumer Data Standards, and offers accredited-recipient
  consumer data sharing to eligible customers through its app and internet banking.
