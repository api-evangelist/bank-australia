apis:
- aid: bank-australia:bank-australia-cdr-product-reference-data-api
  name: Bank Australia CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking
  - Public
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bankaust.com.au/support/open-banking/developer/
  baseURL: https://public.cdr.bankaust.com.au/cds-au/v1
  properties:
  - url: https://www.bankaust.com.au/support/open-banking/developer/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-products
    type: APIReference
  - url: https://consumerdatastandardsaustralia.github.io/standards/includes/swagger/cds_banking.json
    type: OpenAPI
  description: >-
    Public, unauthenticated Product Reference Data (PRD) endpoints under the
    Consumer Data Right. Serves GET /banking/products and GET
    /banking/products/{productId} at the CDS public base
    https://public.cdr.bankaust.com.au/cds-au/v1, returning machine-readable
    product, fee, rate, and eligibility data for Bank Australia's deposit, credit
    card, and lending products. Requests require the mandatory CDS `x-v` version
    header. The contract is the shared DSB Consumer Data Standards Banking OpenAPI
    (OpenAPI 3.0.3), not a bank-proprietary specification.
