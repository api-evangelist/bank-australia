  - Payees
  - Banking
  - Consumer Authorized
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bankaust.com.au/support/open-banking/developer/
  baseURL: https://resource.cdr.bankaust.com.au/cds-au/v1/banking/payees
