    type: OpenAPI
  description: >-
    Consumer-authorized direct-debit and scheduled-payment endpoints under the
    Consumer Data Right, served from
    https://resource.cdr.bankaust.com.au/cds-au/v1. Covers GET
    /banking/accounts/{accountId}/direct-debits and POST
    /banking/accounts/direct-debits (bulk), GET
    /banking/accounts/{accountId}/payments/scheduled and POST
    /banking/payments/scheduled (bulk scheduled payments). Access requires an
    ACCC-accredited data recipient, the customer's consent, and the CDR security
    profile (OIDC/FAPI, mTLS); the resource host rejects unauthenticated
    connections (probed 2026-07-21). The contract is the shared DSB Consumer Data
    Standards Banking OpenAPI (v1.36.0), not a bank-proprietary specification.
